name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  procurement-agent:
    name: procurement-agent (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: procurement-agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest -q

  reviewer-agent:
    name: reviewer-agent (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reviewer-agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest -q

  mining-agent:
    name: mining-agent (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mining-agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest -q

  scripts:
    name: scripts (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: procurement-agent/scripts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest -q

  procurement-agent-ui:
    name: procurement-agent/ui (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: procurement-agent/ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: procurement-agent/ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
